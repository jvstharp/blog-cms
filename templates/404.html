{% extends "base.html" %}
{% block title %}404 Not Found — {{ settings.site_name }}{% endblock %}
{% block content %}
<div class="container">
  <div class="empty-state" style="padding: 120px 0;">
    <div class="empty-icon">🌊</div>
    <h3 style="font-size: 2rem; margin-bottom: 12px;">Page Not Found</h3>
    <p style="margin-bottom: 28px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
